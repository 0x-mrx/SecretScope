name: SecretScope CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting & Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit

      - name: Run Ruff Linter
        run: ruff check backend/app --fix

      - name: Run Bandit Security Analysis
        run: bandit -r backend/app -x backend/tests

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: secretscope_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Pytest Suite
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/secretscope_test
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_KEY: uP2Nl6eE2K3jP-hE0k_g3rO_b5DqR9xK6eJ7Z1d3nK4=
          SECRET_KEY: test-key-123
        run: |
          cd backend
          pytest

  container-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner on Dockerfiles
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  docker-build:
    needs: [lint-and-security, backend-tests, container-security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Container
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: secretscope-backend:latest

      - name: Build Frontend Container
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: secretscope-frontend:latest
